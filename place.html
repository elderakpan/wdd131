<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria</title>
    <meta name="description" content="Discover Nigeria: culture, weather, and geography.">
    <meta name="author" content="Itoro Etim Akpan">

    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Discover Nigeria</h1>
    </header>

    <section class="hero">
        <picture>
            <source srcset="images/nigeria-hero-large.webp" media="(min-width: 768px)">
            <img src="images/nigeria-hero-small.webp" alt="Beautiful landscape of Nigeria" sizes="100vw">
        </picture>
    </section>
    <main>

        <section class="info">
            <h2>About Nigeria</h2>
            <p>
                Nigeria is a vibrant country in West Africa known for its rich culture, large population, and diverse traditions. It is one of the largest economies in Africa.
            </p>
        </section>

        <section class="weather">
            <h2>Weather</h2>
            <p>Temperature: <span id="temp">30</span> °C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>
            <p>Wind Chill: <span id="windChill"></span></p>
        </section>

    </main>

    <footer>
        <p>&copy; <span id="year"></span></p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

</body>

</html>
