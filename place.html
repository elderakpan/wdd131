<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigeria | Place Page | Itoro Etim Akpan</title>
    <meta name="description" content="Explore Nigeria, its culture, weather, and geography.">
    <meta name="author" content="Itoro Etim Akpan">

    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Nigeria</h1>
    </header>

    <!-- HERO (RESPONSIVE IMAGE) -->
    <section class="hero">
        <picture>
            <source srcset="images/nigeria-large.webp" media="(min-width: 768px)">
            <img src="images/nigeria-small-2.webp" alt="Beautiful view of Nigeria">
        </picture>
    </section>

    <main>

        <!-- ABOUT -->
        <section class="card">
            <h2>About Nigeria</h2>
            <p>
                Nigeria is a country in West Africa known for its rich culture, diverse languages, and vibrant economy. It is the most populous country in Africa.
            </p>
        </section>

        <!-- WEATHER -->
        <section class="card weather">
            <h2>Weather</h2>
            <p>Temperature: <span id="temp">8</span> °C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>
            <p>Wind Chill: <span id="windchill"></span></p>
        </section>

    </main>

    <footer>
        <p>© <span id="year"></span> | Itoro Etim Akpan | Nigeria</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
