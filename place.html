<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nigeria | WDD131</title>
    <meta name="description" content="A page about Nigeria including culture and weather.">
    <meta name="author" content="Itoro Etim Akpan">

    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Nigeria</h1>
    </header>

    <main>

        <!-- HERO IMAGE -->
        <picture>
            <source srcset="images/nigeria-large.webp" media="(min-width:1000px)">
            <source srcset="images/city-sunset-medium.webp" media="(min-width:600px)">
            <img src="images/nigeria-small.webp" alt="Nigeria landscape">
        </picture>

        <!-- ABOUT -->
        <section class="card">
            <h2>About Nigeria</h2>
            <p>
                Nigeria is the most populous country in Africa, known for its rich culture, diverse ethnic groups, and vibrant cities like Lagos and Abuja.
            </p>
        </section>

        <!-- WEATHER -->
        <section class="card weather">
            <h2>Weather</h2>

            <!-- SVG for mobile -->
            <div class="weather-icon">
                <svg width="40" height="40" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="20" fill="orange"/>
      </svg>
            </div>

            <ul>
                <li>Temperature: <span id="temp"></span> °C</li>
                <li>Wind Speed: <span id="wind"></span> km/h</li>
                <li>Wind Chill: <span id="windchill"></span></li>
            </ul>
        </section>

    </main>

    <footer>
        <p>
            © <span id="year"></span> | Itoro Etim Akpan | Nigeria
        </p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
