<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Submitted</title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>

    <header>
        <h1>Thank You for Your Review!</h1>
    </header>

    <main>
        <p>Your review has been successfully submitted.</p>
        <p>Total reviews submitted: <span id="reviewCount">0</span></p>
        <a href="form.html">Submit another review</a>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> | Itoro Etim Akpan | Nigeria</p>
        <p id="lastModified"></p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Footer info
            document.getElementById("currentyear").textContent = new Date().getFullYear();
            document.getElementById("lastModified").textContent = "Last Modified: " + document.lastModified;

            // Increment review counter
            let count = localStorage.getItem("reviewCount");
            if (!count) count = 0;
            count = parseInt(count) + 1;
            localStorage.setItem("reviewCount", count);
            document.getElementById("reviewCount").textContent = count;
        });
    </script>
    <p>
        <button type="button" id="clearCounter">Clear Review Counter</button>
    </p>
</body>

</html>
