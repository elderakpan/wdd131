<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Filtered Temples | WDD131</title>

    <link rel="stylesheet" href="styles/filtered-temples.css">

<body>

    <header>
        <h1>Temple Album</h1>
        <nav>
            <button data-filter="all">Home</button>
            <button data-filter="old">Old</button>
            <button data-filter="new">New</button>

            <button data-filter="small">Small</button>
        </nav>
    </header>

    <main id="templeContainer"></main>
