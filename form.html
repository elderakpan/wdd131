<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>

    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <!-- Review Counter -->
        <p>Total reviews submitted so far: <span id="reviewCount">0</span></p>

        <form method="get" action="review.html">

            <!-- Product Name -->
            <label for="product">Product Name</label>
            <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

            <!-- Rating -->
            <fieldset>
                <legend>Overall Rating</legend>

                <input type="radio" id="r1" name="rating" value="1" required>
                <label for="r1">☆</label>

                <input type="radio" id="r2" name="rating" value="2">
                <label for="r2">☆</label>

                <input type="radio" id="r3" name="rating" value="3">
                <label for="r3">☆</label>

                <input type="radio" id="r4" name="rating" value="4">
                <label for="r4">☆</label>

                <input type="radio" id="r5" name="rating" value="5">
                <label for="r5">☆</label>

            </fieldset>

            <!-- Date of Installation -->
            <label for="date">Date of Installation</label>
            <input type="date" id="date" name="date" required>

            <!-- Useful Features -->
            <fieldset>
                <legend>Useful Features</legend>

                <input type="checkbox" id="durability" name="features" value="Durability">
                <label for="durability">Durability</label>

                <input type="checkbox" id="design" name="features" value="Design">
                <label for="design">Design</label>

                <input type="checkbox" id="performance" name="features" value="Performance">
                <label for="performance">Performance</label>

                <input type="checkbox" id="value" name="features" value="Value">
                <label for="value">Value</label>

            </fieldset>

            <!-- Written Review -->
            <label for="review">Written Review</label>
            <textarea id="review" name="review"></textarea>

            <!-- User Name -->
            <label for="username">Your Name</label>
            <input type="text" id="username" name="username">

            <!-- Submit Button -->
            <input type="submit" value="Submit Review">

        </form>
    </main>

    <footer>
        <p>© <span id="currentyear"></span> | Itoro Etim Akpan | Nigeria</p>
        <p id="lastModified"></p>
    </footer>

    <script src="scripts/form.js"></script>
</body>

</html>
